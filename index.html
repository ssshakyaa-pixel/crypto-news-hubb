<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto News Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .brutal-shadow { box-shadow: 4px 4px 0px 0px #0f172a; }
        .brutal-shadow-hover:hover {
            box-shadow: 8px 8px 0px 0px #0f172a;
            transform: translate(-2px, -2px);
        }
    </style>
</head>
<body class="bg-[#FACC15] text-slate-900 min-h-screen font-sans antialiased">

    <!-- Header -->
    <header class="border-b-4 border-slate-900 bg-white sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black uppercase tracking-tight">
                Crypto <span class="bg-green-500 text-white px-2 py-0.5 border-2 border-slate-900">News</span>
            </h1>
            <div class="font-mono text-xs font-bold bg-slate-900 text-white px-3 py-1.5 border-2 border-slate-900">
                LIVE TERMINAL FEED
            </div>
        </div>
    </header>

    <!-- Grid Container -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="loading" class="text-center py-20 font-mono font-bold uppercase">Loading live data stream...</div>
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden"></div>
    </main>

    <!-- Popup Briefing Modal -->
    <div id="briefing-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4 hidden" onclick="closeBriefing()">
        <div class="bg-white w-full max-w-2xl border-4 border-slate-900 brutal-shadow overflow-hidden flex flex-col" onclick="event.stopPropagation()">
            
            <div class="p-6 bg-slate-900 text-white border-b-4 border-slate-900 relative">
                <button onclick="closeBriefing()" class="absolute top-4 right-4 bg-[#FACC15] text-slate-900 border-2 border-slate-900 w-8 h-8 font-black flex items-center justify-center cursor-pointer">&times;</button>
                <span id="modal-time" class="text-xs font-mono text-green-400 font-bold block mb-1"></span>
                <h2 id="modal-title" class="text-xl font-black uppercase tracking-tight pr-8"></h2>
            </div>

            <!-- The Real Real-Time Briefing Text Box -->
            <div class="p-6 space-y-4 bg-white overflow-y-auto max-h-[50vh]">
                <div class="border-2 border-slate-900 p-4 bg-slate-50">
                    <h3 class="text-xs font-mono uppercase font-black text-green-600 mb-2">⚡ Live Market Briefing</h3>
                    <p id="modal-briefing" class="text-sm text-slate-800 font-medium leading-relaxed"></p>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t-2 border-slate-900 flex justify-end gap-3">
                <button onclick="closeBriefing()" class="border-2 border-slate-900 font-mono font-bold text-xs px-4 py-2 bg-white cursor-pointer">CLOSE</button>
                <a id="modal-link" href="" target="_blank" class="bg-green-500 border-2 border-slate-900 text-white font-mono font-black text-xs px-5 py-2.5 brutal-shadow">SOURCE LINK &rarr;</a>
            </div>
        </div>
    </div>

    <script>
        let cachedStories = [];
        const stockImages = [
            "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?w=600&auto=format&fit=crop&q=80",
            "https://images.unsplash.com/photo-1516245834210-c4c142787335?w=600&auto=format&fit=crop&q=80",
            "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=600&auto=format&fit=crop&q=80"
        ];

        async function initData() {
            try {
                const response = await fetch('news.json?t=' + new Date().getTime());
                cachedStories = await response.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('news-grid').classList.remove('hidden');
                renderGrid();
            } catch (e) {
                document.getElementById('loading').innerText = "FAILED TO FETCH LIVE FEED.";
            }
        }

        function renderGrid() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            cachedStories.forEach((story, idx) => {
                grid.innerHTML += `
                    <article class="bg-white border-2 border-slate-900 rounded-none brutal-shadow brutal-shadow-hover flex flex-col justify-between overflow-hidden group">
                        <div class="h-40 border-b-2 border-slate-900">
                            <img src="${stockImages[idx % stockImages.length]}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-5 space-y-3">
                            <div class="flex justify-between text-[10px] font-mono font-bold text-slate-500">
                                <span>${story.time}</span>
                                <span>IMPACT: ${story.importance}/10</span>
                            </div>
                            <h2 class="text-base font-black uppercase tracking-tight line-clamp-2">${story.title}</h2>
                            <p class="text-xs text-slate-600 line-clamp-2">${story.summary}</p>
                        </div>
                        <div class="px-5 pb-5 pt-2">
                            <button onclick="openBriefing(${idx})" class="text-xs font-mono font-black border-b-2 border-slate-900 pb-0.5 hover:text-green-600 cursor-pointer">
                                READ UNIQUE BRIEFING &rarr;
                            </button>
                        </div>
                    </article>
                `;
            });
        }

        window.openBriefing = function(index) {
            const story = cachedStories[index];
            if(!story) return;
            document.getElementById('modal-time').innerText = story.time;
            document.getElementById('modal-title').innerText = story.title;
            document.getElementById('modal-link').href = story.link;
            
            // Pulls directly from your updated JSON database fields
            document.getElementById('modal-briefing').innerText = story.briefing || "No extended briefing compiled for this node yet. Wait for next sync cycle.";

            document.getElementById('briefing-modal').classList.remove('hidden');
        }

        window.closeBriefing = function() {
            document.getElementById('briefing-modal').classList.add('hidden');
        }
        document.addEventListener("DOMContentLoaded", initData);
    </script>
</body>
</html>
