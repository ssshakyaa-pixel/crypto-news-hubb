<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Intelligence Terminal</title>
    <!-- Ultra-stable Production Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-slate-100 min-h-screen font-sans antialiased">

    <!-- Top Glow Border Bar -->
    <div class="h-1 w-full bg-gradient-to-r from-green-500 via-cyan-500 to-emerald-600"></div>

    <!-- Navigation Header -->
    <header class="border-b border-slate-800 bg-[#111827]/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-green-500 to-emerald-600 text-slate-950 font-black px-3 py-1.5 rounded text-xl tracking-tighter">
                    CIT
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white uppercase">
                        INTELLIGENCE <span class="text-green-400 font-mono">TERMINAL</span>
                    </h1>
                    <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Decentralized Live Data Nodes</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <span class="text-xs font-mono text-slate-400 uppercase tracking-wider">Feed Sync Active</span>
            </div>
        </div>
    </header>

    <!-- Main View Frame -->
    <main class="max-w-7xl mx-auto px-4 py-10">

        <!-- Main Screen Loader -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-24 bg-[#111827] border border-slate-800 rounded-xl max-w-xl mx-auto shadow-xl">
            <div class="w-10 h-10 border-4 border-green-500/20 border-t-green-400 rounded-full animate-spin mb-4"></div>
            <p class="text-sm font-mono text-slate-300 uppercase tracking-wider">Synchronizing Node Database...</p>
            <p class="text-xs font-mono text-slate-500 mt-1">Fetching news.json matrix...</p>
        </div>

        <!-- Custom Error & Debug Panel (Only appears if something is broken) -->
        <div id="error-state" class="hidden max-w-2xl mx-auto p-6 bg-red-950/40 border border-red-900/60 rounded-xl shadow-2xl mb-8">
            <div class="flex items-center gap-3 text-red-400 font-bold mb-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                <span class="font-mono text-sm uppercase tracking-wide">Data Stream Connection Exception</span>
            </div>
            <p id="error-message" class="text-xs font-mono text-slate-400 bg-black/40 p-4 border border-slate-800 rounded whitespace-pre-wrap leading-relaxed"></p>
        </div>

        <!-- Core Feed Grid Output -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- JavaScript Injects Feed Cards Securely Here -->
        </div>

    </main>

    <!-- Popup Analytics Modal Frame Layout -->
    <div id="briefing-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden" onclick="closeBriefing()">
        <div class="bg-[#111827] w-full max-w-2xl border border-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col transform transition-all scale-95" onclick="event.stopPropagation()">
            
            <!-- Modal Header Panel -->
            <div class="p-6 bg-[#1F2937]/50 border-b border-slate-800 relative">
                <button onclick="closeBriefing()" class="absolute top-5 right-5 bg-slate-800 hover:bg-slate-700 text-slate-300 w-8 h-8 rounded-full flex items-center justify-center transition-colors cursor-pointer">&times;</button>
                <div class="flex items-center gap-2 mb-1">
                    <span id="modal-time" class="text-[10px] font-mono text-slate-400 bg-slate-800 px-2 py-0.5 rounded"></span>
                    <span id="modal-impact" class="text-[10px] font-mono font-bold bg-green-500/10 text-green-400 border border-green-500/20 px-2 py-0.5 rounded"></span>
                </div>
                <h2 id="modal-title" class="text-xl font-bold text-white tracking-tight pr-6 mt-2 leading-snug"></h2>
            </div>

            <!-- Deep Briefing Core Text Canvas -->
            <div class="p-6 space-y-4 bg-[#111827] overflow-y-auto max-h-[55vh]">
                <div class="bg-slate-950/60 p-5 rounded-xl border border-slate-800/80">
                    <h3 class="text-xs font-mono uppercase font-bold text-green-400 mb-2 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span> Extended Market Intelligence Briefing
                    </h3>
                    <p id="modal-briefing" class="text-sm text-slate-300 font-normal leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>

            <!-- Modal Bottom Control Row -->
            <div class="p-4 bg-[#1F2937]/30 border-t border-slate-800 flex justify-end gap-3">
                <button onclick="closeBriefing()" class="text-xs font-mono font-bold text-slate-400 hover:text-white bg-slate-800 px-4 py-2 rounded-lg transition-colors cursor-pointer">
                    DISMISS
                </button>
                <a id="modal-link" href="" target="_blank" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-slate-950 font-mono font-bold text-xs px-5 py-2.5 rounded-lg shadow-lg transition-all flex items-center gap-1">
                    VERIFY ORIGINAL SOURCE &rarr;
                </a>
            </div>
        </div>
    </div>

    <script>
        let cachedStories = [];
        
        // Dynamic stock matrix backdrops to ensure perfect rendering frames
        const imageLibrary = [
            "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?w=600&auto=format&fit=crop&q=80",
            "https://images.unsplash.com/photo-1516245834210-c4c142787335?w=600&auto=format&fit=crop&q=80",
            "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?w=600&auto=format&fit=crop&q=80"
        ];

        // Clean raw descriptions if markdown leakage or raw HTML tags hit frontend strings
        function sanitizeText(str) {
            if(!str) return "";
            return str.replace(/<[^>]*>/g, '').replace(/[|#*`]/g, '').trim();
        }

        async function initTerminalPipeline() {
            const loader = document.getElementById('loading-state');
            const grid = document.getElementById('news-grid');
            const errPanel = document.getElementById('error-state');
            const errText = document.getElementById('error-message');

            try {
                // Fetch layout parameter with cache busting string tag
                const response = await fetch('news.json?timestamp=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`HTTP System Error! Status Code: ${response.status} - Database file could not be fetched.`);
                }
                
                cachedStories = await response.json();
                
                // If response parsed but contains completely empty array fields
                if (!Array.isArray(cachedStories) || cachedStories.length === 0) {
                    throw new Error("The news.json file was loaded, but it is completely empty [].\nYour background scraper script hasn't populated it or encountered an API error.");
                }

                loader.classList.add('hidden');
                grid.classList.remove('hidden');
                renderMatrixGrid();

            } catch (error) {
                loader.classList.add('hidden');
                errPanel.classList.remove('hidden');
                errText.innerText = `Diagnostic Code Output:\n${error.message}\n\nSteps to solve:\n1. Check your GitHub repository to ensure news.json exists.\n2. Open news.json directly on GitHub to check if it contains actual raw text lines.`;
            }
        }

        function renderMatrixGrid() {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';

            cachedStories.forEach((story, idx) => {
                const cleanTitle = sanitizeText(story.title);
                const cleanSummary = sanitizeText(story.summary || story.title);
                const assetImg = imageLibrary[idx % imageLibrary.length];

                grid.innerHTML += `
                    <article class="bg-[#111827] border border-slate-800 hover:border-slate-700/80 rounded-xl overflow-hidden shadow-xl hover:shadow-2xl transition-all flex flex-col justify-between group">
                        <div>
                            <div class="h-44 bg-slate-950 border-b border-slate-800 overflow-hidden relative">
                                <img src="${assetImg}" class="w-full h-full object-cover group-hover:scale-102 transition-transform duration-500 opacity-80">
                                <div class="absolute top-3 left-3 bg-slate-900/90 text-slate-400 font-mono text-[9px] px-2 py-0.5 rounded border border-slate-800">
                                    NODE INDEX: #${idx + 1}
                                </div>
                            </div>
                            <div class="p-5 space-y-3">
                                <div class="flex justify-between text-[10px] font-mono text-slate-400">
                                    <span>${story.time || 'Processed Recent'}</span>
                                    <span class="text-green-400 font-bold">IMPACT: ${story.importance || 5}/10</span>
                                </div>
                                <h2 class="text-base font-bold text-white tracking-tight line-clamp-2 group-hover:text-green-400 transition-colors leading-snug">
                                    ${cleanTitle}
                                </h2>
                                <p class="text-xs text-slate-400 line-clamp-2 leading-relaxed">
                                    ${cleanSummary}
                                </p>
                            </div>
                        </div>
                        <div class="px-5 pb-5 pt-2 border-t border-slate-800/40 bg-slate-950/20">
                            <button onclick="openBriefing(${idx})" class="text-xs font-mono font-bold text-green-400 hover:text-green-300 flex items-center gap-1 cursor-pointer group/btn">
                                READ MORE <span class="group-hover/btn:translate-x-1 transition-transform">&rarr;</span>
                            </button>
                        </div>
                    </article>
                `;
            });
        }

        window.openBriefing = function(index) {
            const story = cachedStories[index];
            if(!story) return;

            document.getElementById('modal-time').innerText = story.time || 'Recent Sync';
            document.getElementById('modal-impact').innerText = `CRITICAL SCORE: ${story.importance || 5}/10`;
            document.getElementById('modal-title').innerText = sanitizeText(story.title);
            
            // Core fallback chain to prevent empty panels if briefing property names miss matching characters
            const coreBriefingText = story.briefing || story.summary || "Extended analytical digest compilation processing for this block node data stream.";
            document.getElementById('modal-briefing').innerText = sanitizeText(coreBriefingText);
            document.getElementById('modal-link').href = story.link || '#';

            document.getElementById('briefing-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        window.closeBriefing = function() {
            document.getElementById('briefing-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.addEventListener("DOMContentLoaded", initTerminalPipeline);
    </script>
</body>
</html>
